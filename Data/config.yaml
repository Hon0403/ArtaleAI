# 單一來源：請只編輯本檔；建置後會複製到 bin\...\Data\config.yaml（與 exe 同目錄為執行時載入路徑）。
# ============================================
# 一般設定
# ============================================
general:
  gameWindowTitle: "MapleStory Worlds-Artale (繁體中文版)"
  lastSelectedWindowName: "MapleStory Worlds-Artale (繁體中文版)"
  lastSelectedProcessName: "msw"
  lastSelectedProcessId: 25336
  minimapUpscaleFactor: 1
  zoomFactor: 15
  magnifierSize: 150
  magnifierOffset: 20
  crosshairSize: 2

# ============================================
# 視覺偵測設定
# ============================================
vision:
  defaultThreshold: 0.7
  maxDetectionResults: 1
  detectionMode: Color
  playerMarker: "templates/minimap/player_marker.png"
  otherPlayers: "templates/minimap/other_players.png"
  playerThreshold: 0.7
  lowerRedHsv: [0, 100, 100]
  upperRedHsv: [10, 255, 255]
  minBarHeight: 4
  maxBarHeight: 8
  minBarWidth: 1
  maxBarWidth: 60
  minBarArea: 8
  uiHeightFromBottom: 200
  dotOffsetY: 50
  detectionBoxWidth: 550
  detectionBoxHeight: 300
  bloodBarDetectIntervalMs: 150
  monsterDetectIntervalMs: 200
  captureFrameRate: 15
  defaultMode: "Color"
  displayOrder: ["Basic", "ContourOnly", "Grayscale", "Color", "TemplateFree"]
  detectionModes:
    Basic:
      displayName: "Basic - 基本匹配 (最快)"
      occlusion: "None"
    ContourOnly:
      displayName: "ContourOnly - 輪廓匹配 (抗形變)"
      occlusion: "None"
    Grayscale:
      displayName: "Grayscale - 灰階匹配 (抗色差)"
      occlusion: "None"
    Color:
      displayName: "Color - 彩色匹配 (預設)"
      occlusion: "None"
    TemplateFree:
      displayName: "TemplateFree - 自由尋找 (無需模板)"
      occlusion: "MorphologyRepair"

# ============================================
# 導航與路徑規劃設定
# ============================================
navigation:
  continuousDetectionIntervalMs: 200
  playerPositionThreshold: 0.7
  otherPlayersThreshold: 0.5
  enableOtherPlayersDetection: true
  waypointReachDistance: 2
  # 側跳著陸 X 容許（px）；與 waypointReachDistance 取較大者驗收（略大可吸收落地後小滑動）
  jumpLandingTolerancePx: 10
  # Alt 放開後多久放開方向鍵（ms）；0＝等著陸偵測結束才放（易在平台上多滑）。約 80～120 可減少 landDx 壓線失敗
  sideJumpReleaseDirectionMsAfterAlt: 95
  # 側跳著陸 Y 容許（px）；0＝使用程式內建 15。整層掉落仍會失敗，僅略放寬測量誤差
  sideJumpLandingMaxFallYPx: 0
  # sideJumpWindupMs：按方向鍵「之前」原地等（不揹方向），防薄邊先走出去
  # sideJumpDirectionLeadMsBeforeAlt：按方向後到按 Alt 的極短間隔；跳不過去可略增 15～22
  sideJumpWindupMs: 22
  sideJumpDirectionLeadMsBeforeAlt: 14
  sideJumpAltHoldMs: 105
  # 邊緣側跳前停穩；略增可減少「還沒跳先滑落」
  sideJumpPreJumpSettleMs: 60
  sideJumpLandingTimeoutMs: 2500
  # 0＝關閉越界反向短按；若常 NeedsCorrection 可改 3～6
  overshootCorrectionMaxTaps: 3
  # 穩定版預設關閉：到達以 Hitbox 為準，不在執行層磨 X。起跳偏時改 1.2～2 並搭配 trim 3～10
  walkGeometricAlignTolerancePx: 1
  walkGeometricTrimMaxTaps: 5
  maxTrackingHistory: 100
  enableAutoPathFinding: true
  enableAutoMovement: true
  platformBounds:
    bufferZone: 5.0
    emergencyZone: 2.0
    cooldownMs: 300

# ============================================
# 地圖編輯器設定
# ============================================
editor:
  deletionRadius: 10.0
  waypointCircleRadius: 4
  waypointColor: "Cyan"

# ============================================
# 視覺化樣式設定
